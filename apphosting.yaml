runConfig:
  minInstances: 0
  maxInstances: 10

env:
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: pawcode
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: pawcode.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: pawcode.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: https://pawcode.web.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: firebase-api-key
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    secret: firebase-messaging-sender-id
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    secret: firebase-app-id
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PROJECT_ID
    value: pawcode
    availability:
      - RUNTIME
  - variable: FIREBASE_CLIENT_EMAIL
    secret: firebase-client-email
    availability:
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase-private-key
    availability:
      - RUNTIME
  - variable: RESEND_API_KEY
    secret: resend-api-key
    availability:
      - RUNTIME
