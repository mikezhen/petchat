name: CI

# Runs on every branch push (developer feedback) and on PRs targeting main
# (the required gate before any code reaches production).
#
# Branch protection for `main` should require these status checks to pass:
#   - "Unit & component tests"
#   - "Cloud Function tests"
#   - "Firestore security rules tests"
#   - "Type check, lint & build"

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:

  # ── Layer 1 & 2: unit + component tests ──────────────────────────────────
  test-app:
    name: Unit & component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit & component tests
        run: npm test

  # ── Cloud Function unit tests ─────────────────────────────────────────────
  test-functions:
    name: Cloud Function tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Run Cloud Function tests
        run: npm test
        working-directory: functions

  # ── Layer 3: Firestore security rules (requires emulator) ─────────────────
  test-rules:
    name: Firestore security rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Firebase emulator JARs
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Pre-download Firestore emulator JAR
        run: npx firebase-tools setup:emulators:firestore

      - name: Start Firestore emulator
        run: npx firebase-tools emulators:start --only firestore --project pawcode-test &

      - name: Wait for Firestore emulator on port 8080
        run: timeout 120 bash -c 'until nc -z localhost 8080; do sleep 2; done && echo "Emulator ready"'

      - name: Run Firestore rules tests
        run: npm run test:rules

  # ── Type check, lint & build (gates on all test jobs) ─────────────────────
  build:
    name: Type check, lint & build
    runs-on: ubuntu-latest
    needs: [test-app, test-functions, test-rules]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY_PAWCODE_85F05 }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: pawcode-85f05.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: pawcode-85f05
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: pawcode-85f05.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_PAWCODE_85F05 }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID_PAWCODE_85F05 }}
          NEXT_PUBLIC_APP_URL: https://pawcode-85f05.web.app
