name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, pawcode-mvp]

jobs:
  build:
    name: Type check, lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Public Firebase config — safe to store as non-secret env vars
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY_PAWCODE_85F05 }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: pawcode-85f05.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: pawcode-85f05-85f05
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: pawcode-85f05.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_PAWCODE_85F05 }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID_PAWCODE_85F05 }}
          NEXT_PUBLIC_APP_URL: https://pawcode-85f05.web.app
          # Admin SDK — server-only, needed for SSR page builds
          FIREBASE_PROJECT_ID: pawcode-85f05
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL_PAWCODE_85F05 }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY_PAWCODE_85F05 }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_PAWCODE_85F05 }}
