name: CI

# Runs on every branch push (developer feedback) and on PRs targeting main
# (the required gate before any code reaches production).
#
# Branch protection for `main` should require these status checks to pass:
#   - "tests / Unit & component tests"
#   - "tests / Cloud Function tests"
#   - "tests / Firestore security rules tests"
#   - "Type check, lint & build"

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:

  tests:
    uses: ./.github/workflows/test-suite.yml

  # ── Type check, lint & build (gates on all test jobs) ─────────────────────
  build:
    name: Type check, lint & build
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY_PAWCODE_85F05 }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: pawcode-85f05.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: pawcode-85f05
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: pawcode-85f05.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_PAWCODE_85F05 }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID_PAWCODE_85F05 }}
          NEXT_PUBLIC_APP_URL: https://pawcode-85f05.web.app
