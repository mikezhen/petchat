name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - pawcode-mvp   # remove this once pawcode-mvp is merged into main

# Cancel any in-progress deploy for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Authenticate to Google Cloud using the Firebase service account
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PAWCODE_85F05 }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Deploy Firestore rules + indexes and Storage rules
      - name: Deploy Firebase rules & indexes
        run: firebase deploy --only firestore,storage --project pawcode-85f05

      # Trigger App Hosting rollout — Firebase builds from source using apphosting.yaml.
      # Env vars and secrets are resolved from apphosting.yaml + Google Secret Manager,
      # so no local build or env injection is needed here.
      - name: Deploy to Firebase App Hosting
        run: firebase apphosting:rollouts:create pawcode-85f05 --project pawcode-85f05 --git-branch ${{ github.ref_name }}
