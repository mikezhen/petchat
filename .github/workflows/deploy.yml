name: Deploy to Firebase

# Triggered only by pushes to main — which can only happen via a merged,
# reviewed PR (main is branch-protected, no direct pushes allowed).
# Tests are re-run here against the actual merge commit as a final safety check
# before any code reaches production.

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Layer 1 & 2: unit + component tests ──────────────────────────────────
  test-app:
    name: Unit & component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit & component tests
        run: npm test

  # ── Cloud Function unit tests ─────────────────────────────────────────────
  test-functions:
    name: Cloud Function tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Run Cloud Function tests
        run: npm test
        working-directory: functions

  # ── Layer 3: Firestore security rules (requires emulator) ─────────────────
  test-rules:
    name: Firestore security rules tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Firebase emulator JARs
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: firebase-emulators-${{ runner.os }}

      - name: Install dependencies
        run: npm ci

      - name: Pre-download Firestore emulator JAR
        run: npx firebase-tools setup:emulators:firestore

      - name: Run Firestore rules tests
        run: npx firebase-tools emulators:exec --only firestore --project pawcode-test "npm run test:rules"

  # ── Build (gates on all three test jobs) ──────────────────────────────────
  build:
    name: Type check, lint & build
    runs-on: ubuntu-latest
    needs: [test-app, test-functions, test-rules]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build static frontend
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY_PAWCODE_85F05 }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: pawcode-85f05.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: pawcode-85f05
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: pawcode-85f05.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID_PAWCODE_85F05 }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID_PAWCODE_85F05 }}
          NEXT_PUBLIC_APP_URL: https://pawcode-85f05.web.app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-out
          path: out/
          retention-days: 1

  # ── Deploy (only runs if build — and therefore all tests — passed) ─────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-out
          path: out/

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Compile Cloud Functions
        run: npm run build
        working-directory: functions

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PAWCODE_85F05 }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules & indexes
        run: firebase deploy --only firestore,storage --project pawcode-85f05

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project pawcode-85f05

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project pawcode-85f05
