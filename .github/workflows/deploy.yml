name: Deploy to Firebase

on:
  push:
    branches:
      - main
      - pawcode-mvp   # remove this once pawcode-mvp is merged into main

# Cancel any in-progress deploy for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Authenticate to Google Cloud using the Firebase service account
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # Deploy Firestore rules + indexes and Storage rules first
      - name: Deploy Firebase rules & indexes
        run: firebase deploy --only firestore,storage --project pawcode

      # Build the Next.js app with production env vars
      - name: Build Next.js app
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: pawcode.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: pawcode
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: pawcode.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_URL: https://pawcode.web.app
          FIREBASE_PROJECT_ID: pawcode
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      # Deploy the Next.js app to Firebase App Hosting
      - name: Deploy to Firebase App Hosting
        run: firebase apphosting:backends:deploy --project pawcode --backend pawcode
