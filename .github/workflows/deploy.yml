name: Deploy to Firebase

# Triggered only by pushes to main — which can only happen via a merged,
# reviewed PR (main is branch-protected, no direct pushes allowed).
# Tests are re-run here against the actual merge commit as a final safety check
# before any code reaches production.

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:

  tests:
    uses: ./.github/workflows/test-suite.yml

  # ── Build (gates on all three test jobs) ──────────────────────────────────
  build:
    needs: tests
    uses: ./.github/workflows/build-suite.yml
    with:
      upload_artifacts: true
    secrets: inherit

  # ── Deploy (only runs if build — and therefore all tests — passed) ─────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install app dependencies
        run: npm ci

      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-output

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PAWCODE_85F05 }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules & indexes
        run: firebase deploy --only firestore,storage --project pawcode-85f05

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --project pawcode-85f05

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project pawcode-85f05
